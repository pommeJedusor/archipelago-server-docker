name: Docker Image CI

on:
  push:
    branches: [ "main", "api" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build Archipelago API Docker image
      run: docker build -t pommejedusor/archipelago_api:latest .
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Archipelago API Archipelago Server Docker image
      run: docker push pommejedusor/archipelago_api:latest
